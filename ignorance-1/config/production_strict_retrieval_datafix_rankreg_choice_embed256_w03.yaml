seed: 42
device: cuda
profile: production_strict_retrieval_datafix_rankreg_choice_embed256_w03

phase4:
  sizes: [15000000, 2700000000]
  steps: 500
  batch_size: 2
  microbatch_size: 1
  max_seq_len: 192
  optimizer: paged_adamw32bit
  paged_optimizer: true
  use_retrieval_data_strategy: true
  max_hard_negatives_per_example: 2
  lr: 0.00001
  max_vram_gb: 23.5
  proxy_recipe: v6_overnight
  step_scale_power: 0.55
  max_step_multiplier: 10.0
  lr_scale_power: 0.2
  max_lr_divisor: 2.83
  scheduler: cosine
  warmup_fraction: 0.25
  min_lr_ratio: 0.20
  ramp_regularizers: true
  regularizer_ramp_fraction: 0.30
  ood_weight: 0.10
  clf_weight: 0.25
  ignorance_warmup_fraction: 0.0
  ignorance_start_step: 1000
  ignorance_ramp_steps: 1000
  ema_target_decay: 0.995
  alignment_temperature: 0.05
  retrieval_margin: 0.20
  retrieval_margin_weight: 0.75
  spread_weight: 0.05
  query_spread_weight: 0.10
  pred_spread_weight: 0.10
  use_vicreg_retrieval: true
  vicreg_weight: 1.0
  vicreg_invariance_weight: 1.0
  vicreg_variance_weight: 1.0
  vicreg_covariance_weight: 0.10
  vicreg_variance_target: 0.75
  vicreg_prediction_weight: 1.0
  vicreg_queue_samples: 128
  use_query_multiview: true
  query_multiview_weight: 0.0
  query_multiview_prediction_weight: 0.0
  query_margin_weight: 0.10
  query_margin: 0.20
  rank_reg_weight: 0.03
  rank_reg_eps: 1.0e-4
  rank_reg_target: code+query
  stat_buffer_size: 512
  query_buffer_size: 1024
  code_buffer_size: 1024
  pred_buffer_size: 1024
  embed_dim_override: 256
  encoder_layers_override: 4
  encoder_heads_override: 8
  predictor_layers_override: 4
  predictor_heads_override: 8
  decoder_layers_override: 2
  decoder_heads_override: 8
  decoder_hidden_dim_override: 256

evaluation:
  lexical_weight: 0.7
  confidence_threshold: 0.4
  intent: introduce rank regularization and staged ignorance ramp to reduce collapse and improve paraphrase retrieval
  notes:
    - Adds covariance log-det rank regularizer on code/query buffers.
    - Stages ignorance loss: start at step 1000, ramp over 1000 steps.
    - Keeps the stable paged 32-bit AdamW optimizer and 192-token envelope.
